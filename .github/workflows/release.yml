name: Release

# Publishing is keyed to the VERSION BUMP, not to a manually pushed tag: on
# every push to main, the decide job checks whether package.json carries a
# version that has no v-tag yet — if so, this run gates, tests, creates the
# tag, and publishes. Cut a release with:
#
#   1. retitle CHANGELOG.md's Unreleased to the new version (the gate insists)
#   2. npm version <patch|minor|major>
#   3. git push          # no --follow-tags needed; CI derives and pushes the tag
#
# A push that does not bump the version is a no-op here. The old paths still
# work: pushing a v* tag by hand, or the manual trigger (publishes whatever
# version main carries). The tag is created in-workflow from package.json, so
# a tag/version mismatch is structurally impossible on this path. The run
# finishes by creating the GitHub Release, whose body is the version's
# CHANGELOG.md section (one source of truth). Every publish step is
# idempotent, so a run that stopped partway is completed by the next push.
#
# Why one workflow instead of a tagger that triggers a releaser: tags pushed
# with the default GITHUB_TOKEN do not trigger other workflows (GitHub's
# anti-recursion rule), so a two-workflow cascade fails silently.
#
# Auth is npm trusted publishing (OIDC): the package's npmjs.com settings name
# this repo + workflow as a trusted publisher, so no token secret is involved
# and no auth config may be written (a token line in .npmrc would shadow OIDC).
# OIDC needs npm >= 11.5.1; the Node 20 runner bundles npm 10, hence the
# npm@11 upgrade step before publish (11.x, not latest: npm 12 refuses
# Node 20). Provenance requires a public repo.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

# One release at a time; a queued push waits rather than racing the publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_REF_TYPE" = "tag" ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "explicit release ref/dispatch for $VERSION"
          elif ! git ls-remote --exit-code origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION has no tag yet — releasing"
          elif ! gh release view "v$VERSION" > /dev/null 2>&1; then
            # Tagged but no GitHub Release: a prior run stopped partway (the
            # publish steps are idempotent, so re-entering is safe).
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is tagged but has no GitHub Release — completing it"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is fully released — not a release push"
          fi

  publish:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release tag
      id-token: write # npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Refuse to publish a version the changelog does not describe (and a
      # tag that does not match package.json). Dependency-free, so it runs
      # before install for the fastest possible failure.
      - run: node scripts/changelog-gate.mjs
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Tag from package.json when this run was not started by a tag push.
      # Created with GITHUB_TOKEN, so it cannot re-trigger this workflow.
      # Idempotent: an existing matching tag is left alone.
      - name: Tag the release
        if: github.ref_type != 'tag'
        run: |
          VERSION=${{ needs.decide.outputs.version }}
          if git ls-remote --exit-code origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
            echo "v$VERSION already tagged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$VERSION"
            git push origin "refs/tags/v$VERSION"
          fi
      # OIDC publish needs npm >= 11.5.1. Pinned to the 11.x line: npm 12
      # refuses Node 20, and the runner stays on the package's supported
      # minimum (engines: node >= 20) on purpose.
      - run: npm install -g npm@11
      # Idempotent: a version already on the registry is not re-published, so
      # a re-entered run (e.g. completing a missing GitHub Release) passes.
      - name: Publish to npm
        run: |
          VERSION=${{ needs.decide.outputs.version }}
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION is already on npm — skipping publish"
          else
            npm publish --provenance --access public
          fi
      # The GitHub Release body IS the changelog section — one source of
      # truth, and the changelog gate already guaranteed it is non-empty.
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.decide.outputs.version }}
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "GitHub Release v$VERSION already exists"
          else
            node scripts/changelog-section.mjs "$VERSION" > /tmp/release-notes.md
            gh release create "v$VERSION" --verify-tag \
              --title "v$VERSION" --notes-file /tmp/release-notes.md
          fi
